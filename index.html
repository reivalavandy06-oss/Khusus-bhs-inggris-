<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>English Mastery Elite - Avandy</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root {
            --bg-body: #f8fafc;
            --bg-card: #ffffff;
            --text-main: #0f172a;
            --border: #e2e8f0;
            --accent: #2563eb;
        }

        .dark-mode {
            --bg-body: #020617;
            --bg-card: #0f172a;
            --text-main: #f8fafc;
            --border: #1e293b;
            --accent: #3b82f6;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background-color: var(--bg-body);
            color: var(--text-main);
            transition: all 0.3s ease;
            min-height: 100vh;
        }

        .glass-card {
            background-color: var(--bg-card);
            border: 1px solid var(--border);
            box-shadow: 0 4px 20px rgba(0,0,0,0.05);
        }

        #theme-toggle {
            position: fixed;
            top: 1rem;
            right: 1rem;
            z-index: 1000;
            cursor: pointer;
            width: 45px;
            height: 45px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            background-color: var(--bg-card);
            border: 1px solid var(--border);
            transition: transform 0.2s;
        }

        .dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background-color: var(--border);
            flex-shrink: 0;
        }
        .dot.active { background-color: var(--accent); transform: scale(1.3); }
        .dot.correct { background-color: #22c55e; }
        .dot.incorrect { background-color: #ef4444; }

        .option-btn {
            border: 2px solid var(--border);
            transition: all 0.2s;
            text-align: left;
            width: 100%;
            padding: 1.25rem;
            border-radius: 1.25rem;
            font-weight: 500;
            margin-bottom: 0.75rem;
        }

        .option-btn:hover:not(:disabled) {
            border-color: var(--accent);
            background-color: rgba(37, 99, 235, 0.05);
        }

        .option-btn.correct { background-color: rgba(34, 197, 94, 0.1) !important; border-color: #22c55e !important; color: #22c55e; }
        .option-btn.incorrect { background-color: rgba(239, 68, 68, 0.1) !important; border-color: #ef4444 !important; color: #ef4444; }

        .hero-img {
            width: 100%;
            height: 180px;
            object-fit: cover;
            border-radius: 1.5rem;
            margin-bottom: 1.5rem;
        }

        .jump-btn {
            padding: 0.75rem;
            background-color: var(--accent);
            color: white;
            border-radius: 0.75rem;
            font-weight: bold;
            font-size: 0.75rem;
            transition: all 0.2s;
        }
        .jump-btn:active { transform: scale(0.9); }
    </style>
</head>
<body class="flex flex-col items-center justify-start p-4 pt-16">

    <!-- Theme Toggle -->
    <div id="theme-toggle" onclick="toggleTheme()" class="glass-card shadow-lg">
        <span id="theme-icon">☀️</span>
    </div>

    <!-- Halaman Landing -->
    <div id="landing-page" class="w-full max-w-lg glass-card rounded-[2.5rem] p-8 text-center">
        <img src="https://images.unsplash.com/photo-1456513080510-7bf3a84b82f8?auto=format&fit=crop&q=80&w=1000" alt="Verb Mastery" class="hero-img">
        <h1 class="text-3xl font-black mb-1">English Mastery Elite</h1>
        <p class="text-sm opacity-60 mb-8 font-medium italic">by Avandy</p>
        
        <div class="text-left space-y-5 mb-8">
            <div>
                <label class="block text-[10px] font-black uppercase tracking-widest mb-2 opacity-50 ml-1">Nama Kamu:</label>
                <input type="text" id="user-name" placeholder="Siapa namamu?" class="w-full p-4 rounded-2xl glass-card border-2 focus:border-blue-500 outline-none transition-all font-semibold">
            </div>
            <div class="p-5 bg-blue-50/50 dark:bg-blue-900/10 rounded-3xl border border-blue-100/50 dark:border-blue-800/50">
                <p class="text-xs leading-relaxed opacity-80">
                    Kuis khusus materi <strong>Verb & Verb-ing</strong>. Mulai dari 5 soal, naik bertahap (+5) hingga 100 soal!
                </p>
            </div>
        </div>

        <button onclick="startQuiz()" class="w-full bg-blue-600 hover:bg-blue-700 text-white py-4 rounded-2xl font-bold text-lg shadow-xl shadow-blue-500/20 transition-all active:scale-95">
            Start Quiz
        </button>
    </div>

    <!-- Halaman Kuis -->
    <div id="quiz-page" class="hidden w-full max-w-xl glass-card rounded-[2.5rem] overflow-hidden">
        <div class="p-5 border-b border-gray-100 dark:border-gray-800">
            <div class="flex justify-between items-center mb-5">
                <div class="flex items-center gap-2 bg-gray-100 dark:bg-slate-800 px-3 py-1.5 rounded-full">
                    <span id="display-name" class="font-bold text-xs truncate max-w-[120px]">User</span>
                </div>
                <div class="flex gap-4 items-center">
                    <div class="flex gap-3 text-[10px] font-black">
                        <span class="text-green-500">✅ <span id="correct-count">0</span></span>
                        <span class="text-red-500">❌ <span id="wrong-count">0</span></span>
                    </div>
                    <span class="bg-blue-600 text-white px-3 py-1 rounded-full text-[10px] font-black" id="q-number-text">1/5</span>
                </div>
            </div>
            <div id="dots-container" class="flex flex-wrap justify-center gap-1.5 px-2"></div>
        </div>

        <div class="p-6 md:p-10">
            <span id="cat-label" class="text-[9px] font-black uppercase tracking-[0.3em] text-blue-500 mb-4 block">VERB CHALLENGE</span>
            
            <div class="mb-8">
                <h2 id="q-text" class="text-xl md:text-2xl font-bold leading-snug"></h2>
                <p id="q-text-id" class="text-sm opacity-60 mt-2 italic border-l-4 border-blue-200 dark:border-blue-900 pl-3"></p>
            </div>
            
            <div id="options-list" class="flex flex-col"></div>

            <div id="feedback-box" class="mt-8 hidden p-6 rounded-3xl border">
                <div id="feedback-status" class="font-black text-[10px] uppercase mb-2 tracking-widest"></div>
                <div class="space-y-1">
                    <p id="feedback-reason-en" class="text-sm font-semibold"></p>
                    <p id="feedback-reason-id" class="text-xs opacity-70 italic"></p>
                </div>
            </div>
        </div>

        <div class="p-6 bg-gray-50/50 dark:bg-slate-800/20 flex justify-between items-center px-8 border-t border-gray-100 dark:border-gray-800">
            <button id="prev-btn" onclick="prevQ()" class="text-sm font-bold opacity-40 hover:opacity-100 transition-all">Back</button>
            <button id="next-btn" onclick="nextQ()" class="bg-blue-600 text-white px-10 py-3.5 rounded-2xl font-bold disabled:opacity-30 shadow-lg">Berikutnya</button>
        </div>
    </div>

    <!-- Halaman Hasil -->
    <div id="result-page" class="hidden w-full max-w-lg glass-card rounded-[2.5rem] p-10 text-center">
        <div class="text-5xl mb-6">🏆</div>
        <h2 class="text-2xl font-black mb-2 uppercase tracking-tight">Selesai, <span id="final-user" class="text-blue-600"></span>!</h2>
        <p class="opacity-50 text-xs mb-8">Pilih jumlah soal untuk tantangan berikutnya:</p>

        <div class="grid grid-cols-2 gap-4 mb-8">
            <div class="p-5 bg-gray-50 dark:bg-slate-800/50 rounded-3xl border border-gray-100 dark:border-gray-800">
                <p class="text-[9px] font-black opacity-40 uppercase mb-1">Skor Akhir</p>
                <p id="final-score" class="text-3xl font-black">0/100</p>
            </div>
            <div class="p-5 bg-gray-50 dark:bg-slate-800/50 rounded-3xl border border-gray-100 dark:border-gray-800">
                <p class="text-[9px] font-black opacity-40 uppercase mb-1">Peringkat</p>
                <p id="final-rank" class="text-xl font-bold text-blue-600">-</p>
            </div>
        </div>

        <div class="text-left">
            <p class="text-[10px] font-black opacity-50 uppercase mb-4 ml-1 tracking-widest">Tambah Soal (+5):</p>
            <div id="jump-buttons-container" class="grid grid-cols-4 gap-2"></div>
        </div>
        
        <button onclick="location.reload()" class="w-full mt-10 py-4 text-xs font-bold opacity-40 hover:opacity-100 transition-all border-t border-gray-100 dark:border-gray-800">
            Latihan Ulang dari Awal
        </button>
    </div>

    <script>
        // MURNI VERB & VERB-ING (100 SOAL UNIK)
        const MASTER_BANK = [
            { q_en: "Monita, Bagas, and Andi ___ listening to songs right now.", q_id: "Monita, Bagas, dan Andi ___ sedang mendengarkan lagu sekarang.", cat: "Present Continuous", opt: ["is", "are", "am"], ok: 1, r_en: "Plural subject with 'now' uses 'are + verb-ing'.", r_id: "Subjek jamak dengan 'sekarang' memakai 'are + verb-ing'." },
            { q_en: "She ___ to the market every morning.", q_id: "Dia (pr) ___ ke pasar setiap pagi.", cat: "Simple Present", opt: ["go", "goes", "going"], ok: 1, r_en: "Third person singular (She) uses Verb+s/es.", r_id: "Orang ketiga tunggal (She) memakai Kata Kerja+s/es." },
            { q_en: "I love ___ in the garden on Sundays.", q_id: "Saya suka ___ di taman pada hari Minggu.", cat: "Gerund", opt: ["work", "working", "works"], ok: 1, r_en: "After verbs like 'love/like', we use verb-ing.", r_id: "Setelah kata kerja 'love/like', kita memakai verb-ing." },
            { q_en: "They ___ English for two hours yesterday.", q_id: "Mereka ___ bahasa Inggris selama dua jam kemarin.", cat: "Simple Past", opt: ["study", "studied", "studying"], ok: 1, r_en: "Yesterday indicates past tense, use Verb 2.", r_id: "Yesterday menunjukkan masa lampau, pakai Kata Kerja ke-2." },
            { q_en: "He is ___ a sandwich for breakfast.", q_id: "Dia sedang ___ roti lapis untuk sarapan.", cat: "Present Continuous", opt: ["eat", "eats", "eating"], ok: 2, r_en: "Is/am/are + verb-ing means 'currently doing'.", r_id: "Is/am/are + verb-ing berarti 'sedang dilakukan'." },
            { q_en: "My father doesn't ___ coffee.", q_id: "Ayah saya tidak ___ kopi.", cat: "Simple Present Negative", opt: ["drink", "drinks", "drinking"], ok: 0, r_en: "After 'doesn't', verb returns to base form.", r_id: "Setelah 'doesn't', kata kerja kembali ke bentuk dasar." },
            { q_en: "Stop ___! The teacher is coming.", q_id: "Berhenti ___! Guru sedang datang.", cat: "Gerund", opt: ["talk", "talking", "talks"], ok: 1, r_en: "The verb 'stop' is followed by verb-ing.", r_id: "Kata kerja 'stop' diikuti oleh verb-ing." },
            { q_en: "We ___ the movie last night.", q_id: "Kami ___ film itu tadi malam.", cat: "Simple Past", opt: ["watch", "watched", "watching"], ok: 1, r_en: "'Last night' is a past time signal.", r_id: "'Last night' adalah sinyal waktu lampau." },
            { q_en: "Do you enjoy ___ novels?", q_id: "Apakah kamu menikmati ___ novel?", cat: "Gerund after Enjoy", opt: ["read", "reading", "reads"], ok: 1, r_en: "Enjoy + verb-ing.", r_id: "Enjoy + verb-ing." },
            { q_en: "She ___ her homework at 7 PM every day.", q_id: "Dia ___ PR-nya jam 7 malam setiap hari.", cat: "Simple Present", opt: ["do", "does", "doing"], ok: 1, r_en: "She uses 'does'.", r_id: "She memakai 'does'." },
            ...Array.from({length: 90}, (_, i) => {
                const types = [
                    {en: "I saw her ___ in the park.", id: "Saya melihatnya sedang ___ di taman.", o: ["run", "running", "runs"], ans: 1, re: "Action in progress.", ri: "Aksi yang sedang berlangsung."},
                    {en: "We always ___ hands before eating.", id: "Kami selalu ___ tangan sebelum makan.", o: ["wash", "washes", "washing"], ans: 0, re: "Simple present habit.", ri: "Kebiasaan sehari-hari."},
                    {en: "He ___ a letter to his friend an hour ago.", id: "Dia ___ surat untuk temannya satu jam yang lalu.", o: ["write", "wrote", "writing"], ans: 1, re: "Past V2.", ri: "Lampau pakai V2."},
                    {en: "It is ___ outside.", id: "Di luar sedang ___.", o: ["rain", "raining", "rains"], ans: 1, re: "Continuous weather.", ri: "Cuaca sedang berlangsung."}
                ];
                const s = types[i % 4];
                return {
                    q_en: `[Q${i+11}] ${s.en}`,
                    q_id: `[S${i+11}] ${s.id}`,
                    cat: "Verb Focus",
                    opt: s.o,
                    ok: s.ans,
                    r_en: s.re,
                    r_id: s.ri
                };
            })
        ];

        let currentLimit = 5;
        let activeData = [];
        let currentIdx = 0;
        let userAnswers = [];
        let userName = "";

        function startQuiz() {
            const nameInput = document.getElementById('user-name').value;
            if(!nameInput.trim()) return;
            userName = nameInput;
            initQuizSession(5);
            document.getElementById('landing-page').classList.add('hidden');
            document.getElementById('quiz-page').classList.remove('hidden');
        }

        function initQuizSession(limit) {
            currentLimit = limit;
            currentIdx = 0;
            activeData = MASTER_BANK.slice(0, currentLimit);
            userAnswers = new Array(currentLimit).fill(null);
            document.getElementById('display-name').innerText = userName;
            document.getElementById('correct-count').innerText = 0;
            document.getElementById('wrong-count').innerText = 0;
            loadQ();
        }

        function loadQ() {
            const data = activeData[currentIdx];
            document.getElementById('q-number-text').innerText = `${currentIdx + 1}/${currentLimit}`;
            document.getElementById('cat-label').innerText = data.cat;
            document.getElementById('q-text').innerText = data.q_en;
            document.getElementById('q-text-id').innerText = data.q_id;
            
            const list = document.getElementById('options-list');
            list.innerHTML = '';
            data.opt.forEach((o, i) => {
                const btn = document.createElement('button');
                btn.className = 'option-btn glass-card';
                btn.innerHTML = `<span class="opacity-30 mr-3 text-xs font-black">${String.fromCharCode(65+i)}</span> ${o}`;
                if(userAnswers[currentIdx] !== null) {
                    btn.disabled = true;
                    if(i === data.ok) btn.classList.add('correct');
                    else if(i === userAnswers[currentIdx].selected) btn.classList.add('incorrect');
                } else {
                    btn.onclick = () => selectOpt(i);
                }
                list.appendChild(btn);
            });

            const feed = document.getElementById('feedback-box');
            if(userAnswers[currentIdx] !== null) {
                feed.classList.remove('hidden');
                const isOk = userAnswers[currentIdx].isCorrect;
                document.getElementById('feedback-status').innerText = isOk ? "Correct / Benar" : "Incorrect / Salah";
                document.getElementById('feedback-status').className = isOk ? "font-black text-[10px] text-green-500 mb-2 tracking-widest" : "font-black text-[10px] text-red-500 mb-2 tracking-widest";
                document.getElementById('feedback-reason-en').innerText = data.r_en;
                document.getElementById('feedback-reason-id').innerText = data.r_id;
                document.getElementById('next-btn').disabled = false;
            } else {
                feed.classList.add('hidden');
                document.getElementById('next-btn').disabled = true;
            }
            document.getElementById('prev-btn').style.visibility = currentIdx === 0 ? 'hidden' : 'visible';
            renderDots();
        }

        function renderDots() {
            const container = document.getElementById('dots-container');
            container.innerHTML = '';
            const maxDots = 20;
            const startIdx = Math.max(0, currentIdx - Math.floor(maxDots/2));
            const endIdx = Math.min(activeData.length, startIdx + maxDots);
            for(let i = startIdx; i < endIdx; i++) {
                const d = document.createElement('div');
                d.className = 'dot';
                if(i === currentIdx) d.classList.add('active');
                if(userAnswers[i] !== null) d.classList.add(userAnswers[i].isCorrect ? 'correct' : 'incorrect');
                container.appendChild(d);
            }
        }

        function selectOpt(idx) {
            const isOk = idx === activeData[currentIdx].ok;
            userAnswers[currentIdx] = { selected: idx, isCorrect: isOk };
            document.getElementById('correct-count').innerText = userAnswers.filter(a => a && a.isCorrect).length;
            document.getElementById('wrong-count').innerText = userAnswers.filter(a => a && a !== null && !a.isCorrect).length;
            loadQ();
        }

        function nextQ() {
            if(currentIdx < currentLimit - 1) {
                currentIdx++;
                loadQ();
            } else {
                showResult();
            }
        }

        function prevQ() {
            if(currentIdx > 0) {
                currentIdx--;
                loadQ();
            }
        }

        function showResult() {
            document.getElementById('quiz-page').classList.add('hidden');
            document.getElementById('result-page').classList.remove('hidden');
            document.getElementById('final-user').innerText = userName;
            const totalOk = userAnswers.filter(a => a && a.isCorrect).length;
            const score = Math.round((totalOk / currentLimit) * 100);
            document.getElementById('final-score').innerText = `${score}/100`;
            const rank = document.getElementById('final-rank');
            rank.innerText = score === 100 ? "Master" : (score >= 80 ? "Expert" : "Learner");
            renderJumpButtons();
        }

        function renderJumpButtons() {
            const container = document.getElementById('jump-buttons-container');
            container.innerHTML = '';
            // URUT KELIPATAN 5
            for(let i = 10; i <= 100; i += 5) {
                if(i > currentLimit || (currentLimit === 100 && i === 100)) {
                    const b = document.createElement('button');
                    b.className = "jump-btn";
                    b.innerText = i;
                    b.onclick = () => {
                        initQuizSession(i);
                        document.getElementById('result-page').classList.add('hidden');
                        document.getElementById('quiz-page').classList.remove('hidden');
                    };
                    container.appendChild(b);
                    if(currentLimit === 100) break;
                }
            }
        }

        function toggleTheme() {
            document.body.classList.toggle('dark-mode');
            const isDark = document.body.classList.contains('dark-mode');
            // Mode Terang = Matahari, Mode Gelap = Bulan
            document.getElementById('theme-icon').innerText = isDark ? "🌙" : "☀️";
        }
    </script>
</body>
</html>
